- name: Install Nginx
  yum: name=nginx state=present

- name: set nginx conf {{ nginx_user }} {{ nginx_listen_port }}
  template: src=nginx.j2 dest=/etc/nginx/nginx.conf
  notify: reload nginx
  tags: reload nginx

- name: start nginx server
  service:
    name: nginx
    state: started
- name: show info
  debug:
    msg: "{{ item.key }}---> {{ item.value }}"
  loop: "{{ lookup('dict', info) }}"
  tags: test
  when: ansible_distribution_version > '7.9'


